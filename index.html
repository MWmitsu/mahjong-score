<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0b7a3b" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>麻雀スコア</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="icon.svg" />
  <link rel="apple-touch-icon" href="icon.svg" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div id="app">
    <header id="app-header">
      <button id="back-btn" class="icon-btn" aria-label="戻る" hidden>‹</button>
      <h1 id="app-title">麻雀スコア</h1>
    </header>

    <main id="screen" role="main"></main>

    <div id="toast" class="toast" hidden></div>
  </div>

  <!-- ビルド不要・ES Modules を使わない（file:// で動かすため classic script で読み込む） -->
  <script src="js/domain.js"></script>
  <script src="js/store.js"></script>
  <script src="js/sampleData.js"></script>
  <script src="js/selftest.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/components.js"></script>
  <script src="js/sheets.js"></script>
  <script src="js/stats.js"></script>
  <script src="js/screens/players.js"></script>
  <script src="js/screens/rules.js"></script>
  <script src="js/screens/rooms.js"></script>
  <script src="js/screens/sheet.js"></script>
  <script src="js/screens/playerStats.js"></script>
  <script src="js/screens/ranking.js"></script>
  <script src="js/screens/data.js"></script>
  <script src="js/app.js"></script>

  <!-- PWA: ホスティング(https)時のみ Service Worker を登録。localhost や file:// では登録しない。 -->
  <script>
    if ("serviceWorker" in navigator &&
        location.protocol.indexOf("http") === 0 &&
        location.hostname !== "localhost" && location.hostname !== "127.0.0.1") {
      navigator.serviceWorker.register("sw.js").catch(function () {});
    }
  </script>
</body>
</html>
